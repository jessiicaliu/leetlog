<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, 'Helvetica Neue', sans-serif;
        width: 230px;
        background: linear-gradient(160deg, #f0faf0 0%, #e8f5e9 100%);
        padding: 18px 16px 14px;
        color: #3b4a3c;
        text-transform: lowercase;
      }

      h1 {
        font-size: 17px;
        font-weight: 700;
        color: #4a9455;
        text-align: center;
        margin-bottom: 14px;
        letter-spacing: 0.5px;
      }

      #not-leetcode {
        display: none;
        text-align: center;
        padding: 14px 4px;
        color: #7a9e7e;
        font-size: 12px;
        line-height: 1.7;
      }

      #main {
        display: none;
      }

      #timer {
        font-size: 40px;
        text-align: center;
        font-weight: 700;
        letter-spacing: 2px;
        color: #3a7d44;
        background: rgba(255,255,255,0.65);
        border: 1.5px solid #c5e8c5;
        border-radius: 14px;
        padding: 11px 0;
        margin-bottom: 10px;
      }

      .timer-btns {
        display: flex;
        gap: 7px;
        margin-bottom: 10px;
      }

      .timer-btns button {
        flex: 1;
        padding: 7px;
        cursor: pointer;
        font-size: 12px;
        border: 1.5px solid #b8ddb8;
        border-radius: 20px;
        background: rgba(255,255,255,0.7);
        color: #4a9455;
        font-weight: 600;
        transition: background 0.15s, border-color 0.15s;
        text-transform: lowercase;
      }

      .timer-btns button:hover {
        background: #d6f0d6;
        border-color: #8cc98c;
      }

      #logBtn {
        width: 100%;
        padding: 10px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        background: #5aaa65;
        color: white;
        border: none;
        border-radius: 20px;
        transition: background 0.15s, transform 0.1s;
        letter-spacing: 0.2px;
        text-transform: lowercase;
      }

      #logBtn:hover {
        background: #469950;
        transform: translateY(-1px);
      }

      #logBtn:active {
        transform: translateY(0);
      }

      #logBtn:disabled {
        background: #a8d5a2;
        cursor: default;
        transform: none;
      }

      #notes {
        width: 100%;
        height: 58px;
        resize: none;
        border: 1.5px solid #b8ddb8;
        border-radius: 10px;
        background: rgba(255,255,255,0.7);
        padding: 7px 9px;
        font-size: 11px;
        font-family: inherit;
        color: #3b4a3c;
        margin-bottom: 10px;
        outline: none;
        text-transform: lowercase;
      }

      #notes::placeholder {
        color: #aac9aa;
      }

      #notes:focus {
        border-color: #8cc98c;
      }

      #status {
        margin-top: 9px;
        font-size: 11px;
        text-align: center;
        color: #5aaa65;
        min-height: 14px;
      }

      #topics-section {
        margin-bottom: 10px;
      }

      #topics-section summary {
        font-size: 11px;
        color: #7a9e7e;
        cursor: pointer;
        user-select: none;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 6px;
      }

      #topics-section summary::-webkit-details-marker { display: none; }

      #topics-section summary::before {
        content: '▸';
        font-size: 9px;
        transition: transform 0.15s;
      }

      #topics-section[open] summary::before {
        transform: rotate(90deg);
      }

      #topic-count {
        color: #4a9455;
        font-weight: 600;
      }

      #topics-list {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        max-height: 130px;
        overflow-y: auto;
        padding: 2px 1px 4px;
      }

      .topic-pill {
        font-size: 10px;
        padding: 3px 9px;
        border-radius: 20px;
        border: 1.5px solid #b8ddb8;
        background: rgba(255,255,255,0.7);
        color: #5a8c5a;
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        text-transform: lowercase;
      }

      .topic-pill.selected {
        background: #5aaa65;
        border-color: #5aaa65;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>leetlog</h1>

    <div id="not-leetcode">
      open a leetcode problem<br>to start timing
    </div>

    <div id="main">
      <div id="timer">00:00</div>
      <div class="timer-btns">
        <button id="startPauseBtn">Start</button>
        <button id="resetBtn">Reset</button>
      </div>
      <details id="topics-section">
        <summary>topics <span id="topic-count"></span></summary>
        <div id="topics-list"></div>
      </details>
      <textarea id="notes" placeholder="notes (optional)"></textarea>
      <button id="logBtn">Log to Notion</button>
      <div id="status"></div>
    </div>

    <script src="config.js"></script>
    <script src="timer.js"></script>
    <script src="notion.js"></script>
    <script src="topics.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
