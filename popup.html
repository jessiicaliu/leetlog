<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        padding: 12px;
        width: 200px;
      }
      #not-leetcode {
        display: none;
        text-align: center;
        padding: 16px 0;
        color: #888;
        font-size: 13px;
        line-height: 1.5;
      }
      #not-leetcode span {
        display: block;
        font-size: 24px;
        margin-bottom: 8px;
      }
      #main {
        display: none;
      }
      #timer {
        font-size: 32px;
        text-align: center;
        font-weight: bold;
        letter-spacing: 2px;
        margin: 8px 0;
      }
      .timer-btns {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }
      .timer-btns button {
        flex: 1;
        padding: 6px;
        cursor: pointer;
        font-size: 12px;
      }
      #logBtn {
        width: 100%;
        padding: 10px;
        cursor: pointer;
        font-size: 14px;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        text-align: center;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div id="not-leetcode">
      Open a LeetCode problem to start logging
    </div>

    <div id="main">
      <div id="timer">00:00</div>
      <div class="timer-btns">
        <button id="startPauseBtn">Start</button>
        <button id="resetBtn">Reset</button>
      </div>
      <button id="logBtn">Log to Notion</button>
      <div id="status"></div>
    </div>

    <script src="config.js"></script>
    <script src="timer.js"></script>
    <script src="notion.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
